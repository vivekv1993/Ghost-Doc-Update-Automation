              doc: "Group profile focusing on bare-metal physical connection breaks."
              status_char_items:
                - id: "D"
                  doc: "<p>Ethernet physical layer drop. Verified cable disconnection or controller power failure.</p>"
                - id: "W"
                  doc: "<p>Wireless radio decay event. Signal baseline dropped unexpectedly below minimum decibel limits.</p>"
            - since: "3.5" # Valid schema timeline marker instead of id
              doc: "Group profile mapping virtual link and network address layout anomalies."
              status_char_items:
                - id: "T"
                  doc: "Timeout penalty bound hit while processing internal core system DNS table lookup."
